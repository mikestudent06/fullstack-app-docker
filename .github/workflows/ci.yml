name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

  docker-prod-build:
    name: Production Dockerfiles — build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API production image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/Dockerfile.prod
          push: false
          tags: fullstack-app-api:ci

      - name: Build client production image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile.prod
          push: false
          tags: fullstack-app-client:ci
          build-args: |
            VITE_API_URL=http://localhost:3000
